<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kunj Patel Portfolio Intro</title>
    <style>
      :root {
        --bg: #030712;
        --panel: rgba(15, 23, 42, 0.68);
        --cyan: #67e8f9;
        --violet: #a78bfa;
        --mint: #6ee7b7;
        --text: #f8fafc;
        --muted: #cbd5e1;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .frame {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        color: var(--text);
        background:
          radial-gradient(circle at 18% 18%, rgba(103, 232, 249, 0.16), transparent 360px),
          radial-gradient(circle at 82% 20%, rgba(167, 139, 250, 0.16), transparent 410px),
          radial-gradient(circle at 50% 100%, rgba(110, 231, 183, 0.1), transparent 420px),
          linear-gradient(135deg, #030712 0%, #07111f 52%, #020617 100%);
      }

      .stars,
      .grid,
      .particles,
      .neural-lines {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .stars {
        background-image:
          radial-gradient(circle, rgba(255, 255, 255, 0.72) 0 1px, transparent 1.4px),
          radial-gradient(circle, rgba(103, 232, 249, 0.42) 0 1px, transparent 1.5px);
        background-size: 96px 96px, 156px 156px;
        background-position: 0 0, 48px 42px;
        opacity: 0;
        animation: starsIn 15s linear forwards;
      }

      .grid {
        background:
          linear-gradient(rgba(103, 232, 249, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(103, 232, 249, 0.055) 1px, transparent 1px);
        background-size: 92px 92px;
        mask-image: linear-gradient(to bottom, black, transparent 88%);
        opacity: 0;
        animation: gridIn 15s ease forwards;
      }

      .particle {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(103, 232, 249, 0.66);
        box-shadow: 0 0 28px rgba(103, 232, 249, 0.44);
        opacity: 0;
        animation: particleFloat 15s ease-in-out forwards;
      }

      .particle:nth-child(1) { top: 22%; left: 16%; animation-delay: 0.2s; }
      .particle:nth-child(2) { top: 34%; left: 78%; animation-delay: 0.5s; background: rgba(167, 139, 250, 0.68); }
      .particle:nth-child(3) { top: 72%; left: 24%; animation-delay: 0.8s; background: rgba(110, 231, 183, 0.64); }
      .particle:nth-child(4) { top: 62%; left: 70%; animation-delay: 1.1s; }
      .particle:nth-child(5) { top: 18%; left: 52%; animation-delay: 1.4s; }

      .line {
        position: absolute;
        height: 1px;
        width: 360px;
        background: linear-gradient(90deg, transparent, rgba(103, 232, 249, 0.5), transparent);
        opacity: 0;
        transform-origin: center;
        animation: linePulse 15s ease forwards;
      }

      .line:nth-child(1) { top: 30%; left: 28%; transform: rotate(14deg); }
      .line:nth-child(2) { top: 58%; left: 46%; transform: rotate(-18deg); animation-delay: 0.4s; }
      .line:nth-child(3) { top: 44%; left: 60%; transform: rotate(28deg); animation-delay: 0.8s; }

      .name {
        position: absolute;
        top: 392px;
        left: 0;
        width: 100%;
        text-align: center;
        font-size: 94px;
        font-weight: 800;
        letter-spacing: 0.02em;
        opacity: 0;
        animation: nameReveal 15s ease forwards;
      }

      .dashboard {
        position: absolute;
        top: 278px;
        left: 520px;
        width: 880px;
        padding: 52px;
        border: 1px solid rgba(103, 232, 249, 0.24);
        border-radius: 34px;
        background:
          linear-gradient(135deg, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.52)),
          radial-gradient(circle at top left, rgba(103, 232, 249, 0.16), transparent 360px);
        box-shadow: 0 28px 90px rgba(0, 0, 0, 0.42), 0 0 50px rgba(103, 232, 249, 0.1);
        backdrop-filter: blur(22px);
        opacity: 0;
        transform: translateY(28px) scale(0.98);
        animation: dashboardIn 15s ease forwards;
      }

      .dashboard .eyebrow,
      .focus .eyebrow {
        color: var(--cyan);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.28em;
        text-transform: uppercase;
      }

      .dashboard h1 {
        margin: 18px 0 0;
        font-size: 68px;
        line-height: 1;
      }

      .dashboard p {
        margin: 20px 0 0;
        color: var(--muted);
        font-size: 34px;
      }

      .nodes {
        position: absolute;
        inset: 0;
      }

      .node {
        position: absolute;
        min-width: 260px;
        padding: 22px 30px;
        border: 1px solid rgba(103, 232, 249, 0.28);
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.3), 0 0 28px rgba(103, 232, 249, 0.1);
        color: #ecfeff;
        font-size: 28px;
        font-weight: 750;
        text-align: center;
        opacity: 0;
        animation: nodeIn 15s ease forwards;
      }

      .node.one { top: 226px; left: 220px; animation-delay: 0s; }
      .node.two { top: 624px; left: 220px; animation-delay: 0.18s; }
      .node.three { top: 626px; right: 210px; animation-delay: 0.36s; }

      .focus {
        position: absolute;
        left: 420px;
        right: 420px;
        bottom: 188px;
        display: flex;
        justify-content: center;
        gap: 20px;
        opacity: 0;
        animation: focusIn 15s ease forwards;
      }

      .chip {
        padding: 18px 26px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.07);
        color: #e0f2fe;
        font-size: 24px;
        font-weight: 700;
      }

      .cta {
        position: absolute;
        top: 456px;
        width: 100%;
        text-align: center;
        font-size: 72px;
        font-weight: 850;
        opacity: 0;
        animation: ctaIn 15s ease forwards;
      }

      .cta span {
        color: transparent;
        background: linear-gradient(90deg, var(--cyan), var(--violet), var(--mint));
        background-clip: text;
      }

      @keyframes starsIn {
        0% { opacity: 0; background-position: 0 0, 48px 42px; }
        12%, 100% { opacity: 0.46; }
        100% { background-position: 96px 96px, 204px 198px; }
      }

      @keyframes gridIn {
        0%, 4% { opacity: 0; }
        18%, 100% { opacity: 0.48; }
      }

      @keyframes particleFloat {
        0%, 4% { opacity: 0; transform: translate3d(0, 20px, 0); }
        16%, 100% { opacity: 0.8; transform: translate3d(26px, -24px, 0); }
      }

      @keyframes linePulse {
        0%, 12% { opacity: 0; }
        20%, 86% { opacity: 0.48; }
        100% { opacity: 0.18; }
      }

      @keyframes nameReveal {
        0%, 8% { opacity: 0; transform: translateY(24px); }
        15%, 27% { opacity: 1; transform: translateY(0); }
        34%, 100% { opacity: 0; transform: translateY(-18px); }
      }

      @keyframes dashboardIn {
        0%, 28% { opacity: 0; transform: translateY(28px) scale(0.98); }
        36%, 54% { opacity: 1; transform: translateY(0) scale(1); }
        62%, 100% { opacity: 0; transform: translateY(-20px) scale(0.99); }
      }

      @keyframes nodeIn {
        0%, 53% { opacity: 0; transform: translateY(24px) scale(0.96); }
        61%, 76% { opacity: 1; transform: translateY(0) scale(1); }
        84%, 100% { opacity: 0; transform: translateY(-16px) scale(0.98); }
      }

      @keyframes focusIn {
        0%, 70% { opacity: 0; transform: translateY(18px); }
        77%, 88% { opacity: 1; transform: translateY(0); }
        94%, 100% { opacity: 0; transform: translateY(-12px); }
      }

      @keyframes ctaIn {
        0%, 86% { opacity: 0; transform: translateY(24px); }
        92%, 100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <main class="frame" aria-label="Kunj Patel AI/ML portfolio intro">
      <div class="stars"></div>
      <div class="grid"></div>
      <div class="particles">
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
        <span class="particle"></span>
      </div>
      <div class="neural-lines">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </div>

      <div class="name">Kunj Patel</div>

      <section class="dashboard">
        <div class="eyebrow">AI Command Dashboard</div>
        <h1>Kunj Patel</h1>
        <p>AI/ML Developer</p>
      </section>

      <section class="nodes" aria-label="Project nodes">
        <div class="node one">Lumina AI</div>
        <div class="node two">MoodLens</div>
        <div class="node three">AI Fitness Coach</div>
      </section>

      <section class="focus" aria-label="Focus areas">
        <div class="chip">NLP</div>
        <div class="chip">Computer Vision</div>
        <div class="chip">Generative AI</div>
        <div class="chip">FastAPI</div>
      </section>

      <div class="cta">Building <span>Real-World AI Products</span></div>
    </main>
  </body>
</html>
